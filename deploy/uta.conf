# ──────────────────────────────────────────────────────────────────
#  Unified Threat Alert — Apache httpd virtual host
#  Drop this file into /etc/httpd/conf.d/uta.conf
#  Requires: mod_proxy, mod_proxy_http, mod_rewrite (all default on Rocky Linux)
#  Update the DocumentRoot / Directory paths if your clone is not at /home/soc/uta
# ──────────────────────────────────────────────────────────────────

# Catch-all default — handles every hostname / IP on port 80
<VirtualHost _default_:80>
    ServerName localhost

    # Built React dashboard (npm-deploy.sh → artifacts/soc-dashboard/dist/public/)
    DocumentRoot /home/soc/uta/artifacts/soc-dashboard/dist/public

    <Directory "/home/soc/uta/artifacts/soc-dashboard/dist/public">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # React SPA — send all non-file requests to index.html
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    # Proxy /api/* → Node.js API server on port 8080
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass        /api http://localhost:8080/api
    ProxyPassReverse /api http://localhost:8080/api

    ErrorLog  /var/log/httpd/uta-error.log
    CustomLog /var/log/httpd/uta-access.log combined
</VirtualHost>
