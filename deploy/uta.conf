# ──────────────────────────────────────────────────────────────────
#  Unified Threat Alert — Apache httpd virtual host
#  After running npm-deploy.sh, copy this file to:
#    /etc/httpd/conf.d/uta.conf
#  Then edit the two paths below to match your actual clone location.
# ──────────────────────────────────────────────────────────────────

<VirtualHost *:80>
    ServerName your-server-ip-or-hostname

    # Path to the built React dashboard static files
    # (produced by npm-deploy.sh → artifacts/soc-dashboard/dist/public/)
    DocumentRoot /srv/uta/artifacts/soc-dashboard/dist/public

    <Directory "/srv/uta/artifacts/soc-dashboard/dist/public">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # React SPA — send all non-file requests to index.html
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    # Proxy /api/* to the Node.js API server (port 8080)
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass        /api http://localhost:8080/api
    ProxyPassReverse /api http://localhost:8080/api
</VirtualHost>
