kind = "web"
previewPath = "/"
title = "SOC Map Center"
version = "1.0.0"
id = "artifacts/soc-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18208

[services.development]
run = "pnpm --filter @workspace/soc-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/soc-dashboard", "run", "build" ]
publicDir = "artifacts/soc-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18208"
BASE_PATH = "/"
